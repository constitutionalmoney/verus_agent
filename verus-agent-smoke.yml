name: Verus Agent Smoke

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch: {}

jobs:
  verus-agent-smoke:
    name: Smoke (default + constitutional_money)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy aiohttp pytest pytest-timeout

      - name: Smoke check with default profile
        run: |
          python run_verus_agent_task.py --network testnet smoke

      - name: Smoke check with Constitutional Money profile
        run: |
          python run_verus_agent_task.py --network testnet --allowlist-path capability_allowlist.constitutional_money.json smoke
